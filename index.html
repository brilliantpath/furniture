<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funky Fashion Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #f8f8f8;
            color: #333;
            text-align: center;
        }

        header {
            background: #000;
            color: white;
            padding: 25px 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav {
            background: #222;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            font-weight: 500;
            transition: color 0.3s ease-in-out;
        }

        nav a:hover {
            color: #f4a261;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
        }

        section {
            background: white;
            padding: 40px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 26px;
            color: #222;
        }

        /* Estilização do Carrossel */
        .carousel-container {
            position: relative;
            max-width: 600px;
            margin: auto;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .carousel {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carousel img {
            width: 100%;
            border-radius: 10px;
        }

        .carousel-description {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }

        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .carousel-button:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }

        footer {
            background: #000;
            color: white;
            padding: 20px;
            margin-top: 40px;
            font-size: 14px;
        }

        a {
            color: #f4a261;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>Funky Fashion Hub</header>

    <nav>
        <a href="#casual">Casual</a>
        <a href="#formal">Formal</a>
        <a href="#shoes">Calçados</a>
        <a href="#accessories">Acessórios</a>
        <a href="#trends">Tendências</a>
        <a href="#gallery">Galeria</a>
        <a href="#blog">Blog</a>
        <a href="#reviews">Depoimentos</a>
        <a href="#contact">Contato</a>
    </nav>

    <main>

        <!-- Seção de Moda Casual -->
        <section id="casual">
            <h2>Moda Casual</h2>
            <div class="carousel-container">
                <button class="carousel-button prev" onclick="slide('casual', -1)">❮</button>
                <div class="carousel" id="casual-carousel">
                    <img src="https://via.placeholder.com/450" alt="Look Casual 1">
                    <img src="https://via.placeholder.com/450" alt="Look Casual 2">
                    <img src="https://via.placeholder.com/450" alt="Look Casual 3">
                </div>
                <button class="carousel-button next" onclick="slide('casual', 1)">❯</button>
            </div>
            <p class="carousel-description">Conforto e estilo para o dia a dia.</p>
        </section>

        <!-- Seção de Moda Formal -->
        <section id="formal">
            <h2>Moda Formal</h2>
            <div class="carousel-container">
                <button class="carousel-button prev" onclick="slide('formal', -1)">❮</button>
                <div class="carousel" id="formal-carousel">
                    <img src="https://via.placeholder.com/450" alt="Look Formal 1">
                    <img src="https://via.placeholder.com/450" alt="Look Formal 2">
                    <img src="https://via.placeholder.com/450" alt="Look Formal 3">
                </div>
                <button class="carousel-button next" onclick="slide('formal', 1)">❯</button>
            </div>
            <p class="carousel-description">Elegância para eventos e negócios.</p>
        </section>

        <!-- Outras seções seguem o mesmo padrão -->

    </main>

    <footer>
        &copy; 2025 Funky Fashion Hub. Todos os direitos reservados.
    </footer>

    <script>
        let currentIndex = {
            casual: 0,
            formal: 0
        };

        function slide(category, direction) {
            const carousel = document.getElementById(`${category}-carousel`);
            const images = carousel.children.length;
            currentIndex[category] = (currentIndex[category] + direction + images) % images;
            const offset = -currentIndex[category] * 100;
            carousel.style.transform = `translateX(${offset}%)`;
        }
    </script>

</body>
</html>
